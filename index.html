    const playSound = (type) => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        
        if (type === 'click') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(600, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.1, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.1);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + 0.1);
        } else if (type === 'success') {
          const now = ctx.currentTime;
          const freqs = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
          freqs.forEach((f, i) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = f;
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.12, now + i * 0.08 + 0.02);
            gain.gain.linearRampToValueAtTime(0, now + i * 0.08 + 0.2);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now + i * 0.08);
            osc.stop(now + i * 0.08 + 0.2);
          });
        } else if (type === 'alarm') {
          const now = ctx.currentTime;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(300, now);
          osc.frequency.linearRampToValueAtTime(450, now + 0.15);
          osc.frequency.linearRampToValueAtTime(300, now + 0.3);
          gain.gain.setValueAtTime(0.08, now);
          gain.gain.linearRampToValueAtTime(0.08, now + 0.2);
          gain.gain.linearRampToValueAtTime(0, now + 0.3);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(now + 0.3);
        } else if (type === 'snore') {
          const now = ctx.currentTime;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(120, now);
          osc.frequency.linearRampToValueAtTime(140, now + 0.5);

          gain.gain.linearRampToValueAtTime(0.03, now + 0.8);
          gain.gain.linearRampToValueAtTime(0, now + 1.0);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(now + 1.0);
        }
      } catch (e) {

    function App() {
      // --- 核心遊戲狀態 ---
      const [gameState, setGameState] = useState('welcome'); // 'welcome' | 'dashboard' | 'resting' | 'success' | 'shop' | 'closet'
      const [kidName, setKidName] = useState('');
      const [selectedPixieId, setSelectedPixieId] = useState('alu');
      const [soundEnabled, setSoundEnabled] = useState(true);
      
      // 遊戲幣與背包
      const [crystals, setCrystals] = useState(100); 
      const [ownedItems, setOwnedItems] = useState([]);
      const [equippedItems, setEquippedItems] = useState({ head: null, eyes: null, hand: null, bed: null });

      // 倒數計時狀態 (用眼/休息)
      const [timerMode, setTimerMode] = useState('screen'); 
      const [screenTimeSetting, setScreenTimeSetting] = useState(20); 
      const [breakTimeSetting, setBreakTimeSetting] = useState(5); 
      const [timeLeft, setTimeLeft] = useState(20 * 60);
      const [isActive, setIsActive] = useState(false);
      const [isSpeedUp, setIsSpeedUp] = useState(false); 
      
      // 當前隨機抽取任務
      const [currentQuest, setCurrentQuest] = useState(null);

      // 休息模式日記記錄
      const [restingNote, setRestingNote] = useState(''); 
      const [eyeComfortScore, setEyeComfortScore] = useState('good'); 
      const [lastSavedLog, setLastSavedLog] = useState(null); 

      // 歷史數據紀錄
      const [historyLogs, setHistoryLogs] = useState([
        { id: 1, time: '早上 09:30', name: '綠萌萌', action: '完成「遠眺放鬆」任務', note: '看了窗外好大一隻綠色蜥蜴和榕樹！', comfort: 'good', reward: 15 },
        { id: 2, time: '下午 02:15', name: '綠萌萌', action: '完成「大肢體活動」任務', note: '在客廳客串袋鼠跳了整整12次，腳好痠！', comfort: 'medium', reward: 20 }
      ]);
      
      // 家長中心
      const [parentModalOpen, setParentModalOpen] = useState(false);
      const [parentPinSolved, setParentPinSolved] = useState(false);
      const [parentMathQuiz, setParentMathQuiz] = useState({ num1: 0, num2: 0, ans: '' });
      const [parentError, setParentError] = useState(''); // 心算錯誤提示 (替代傳統 alert)
      const [customQuests, setCustomQuests] = useState(DEFAULT_QUESTS);
      const [newQuestText, setNewQuestText] = useState('');
      const [newQuestCategory, setNewQuestCategory] = useState('body');

      const selectedPixie = PIXIES.find(p => p.id === selectedPixieId) || PIXIES[0];
      const timerRef = useRef(null);

      // 模擬沙盒：直接觸發時間到
      const forceTimeOut = () => {
        if (soundEnabled) playSound('alarm');
        setIsActive(false);
        triggerBreakMode();
      };

      // 觸發休息模式
      const triggerBreakMode = () => {
        setTimerMode('break');
        setTimeLeft(breakTimeSetting * 60);
        setRestingNote('');
        setEyeComfortScore('good');
        
        const randomIndex = Math.floor(Math.random() * customQuests.length);
        setCurrentQuest(customQuests[randomIndex] || DEFAULT_QUESTS[0]);
        setGameState('resting');
        setIsActive(true);
      };

      // 計時器邏輯
      useEffect(() => {
        if (isActive && timeLeft > 0) {
          const intervalSpeed = isSpeedUp ? 10 : 1000; 
          timerRef.current = setTimeout(() => {
            if (timerMode === 'break' && timeLeft % 15 === 0 && soundEnabled) {
              playSound('snore');
            }
            
            setTimeLeft(prev => {
              if (prev <= 1) {
                clearTimeout(timerRef.current);
                handleTimerComplete();
                return 0;
              }
              return prev - 1;
            });
          }, intervalSpeed);
        } else if (timeLeft === 0 && isActive) {
          handleTimerComplete();
        }

        return () => clearTimeout(timerRef.current);
      }, [isActive, timeLeft, isSpeedUp, timerMode]);

      // 時間結束處理
      const handleTimerComplete = () => {
        setIsActive(false);
        if (timerMode === 'screen') {
          forceTimeOut();
        } else {
          completeBreakSuccess();
        }
      };

      // 完成任務並儲存記錄
      const completeBreakSuccess = () => {
        if (soundEnabled) playSound('success');
        setIsActive(false);
        
        const crystalsEarned = Math.floor(Math.random() * 11) + 15; 
        setCrystals(prev => prev + crystalsEarned);
        
        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
        const formattedNote = restingNote.trim() || '跟著小精靈完成了伸展與眼部休息！';
        
        const newLog = {
          id: Date.now(),
          time: `今天 ${timeStr}`,
          name: selectedPixie.name,
          action: `完成「${currentQuest?.categoryName || '健康放鬆'}」任務`,
          note: formattedNote,
          comfort: eyeComfortScore,
          reward: crystalsEarned
        };
        
        setHistoryLogs(prev => [newLog, ...prev]);
        setLastSavedLog(newLog); 
        setGameState('success');
      };

      // 重置並開始新循環
      const startNextScreenSession = () => {
        if (soundEnabled) playSound('click');
        setTimerMode('screen');
        setTimeLeft(screenTimeSetting * 60);
        setGameState('dashboard');
        setIsActive(true);
      };

      // 生成家長驗證問答
      const openParentCorner = () => {
        if (soundEnabled) playSound('click');
        const n1 = Math.floor(Math.random() * 10) + 3;
        const n2 = Math.floor(Math.random() * 8) + 3;
        setParentMathQuiz({ num1: n1, num2: n2, ans: '' });
        setParentPinSolved(false);
        setParentError('');
        setParentModalOpen(true);
      };

      // 驗證家長問答 (不使用任何 alert)
      const verifyParentAnswer = () => {
        const correctAnswer = parentMathQuiz.num1 * parentMathQuiz.num2;
        if (parseInt(parentMathQuiz.ans) === correctAnswer) {
          setParentPinSolved(true);
          setParentError('');
          if (soundEnabled) playSound('success');
        } else {
          if (soundEnabled) playSound('alarm');
          setParentError('算錯囉！請重新嘗試，或請爸爸媽媽來幫忙！');
          const n1 = Math.floor(Math.random() * 10) + 3;
          const n2 = Math.floor(Math.random() * 8) + 3;
          setParentMathQuiz({ num1: n1, num2: n2, ans: '' });
        }
      };

      // 商店購買與穿戴
      const buyItem = (item) => {
        if (crystals >= item.price && !ownedItems.includes(item.id)) {
          if (soundEnabled) playSound('success');
          setCrystals(prev => prev - item.price);
          setOwnedItems(prev => [...prev, item.id]);
        } else {
          if (soundEnabled) playSound('alarm');
        }
      };

      const toggleEquipItem = (item) => {
        if (soundEnabled) playSound('click');
        setEquippedItems(prev => {
          const type = item.type;
          if (prev[type] === item.id) {
            return { ...prev, [type]: null }; 
          } else {
            return { ...prev, [type]: item.id }; 
          }
        });
      };

      // 新增自訂任務
      const handleAddQuest = (e) => {
        e.preventDefault();
        if (!newQuestText.trim()) return;
        const newQ = {
          id: Date.now(),
          text: newQuestText,
          category: newQuestCategory,
          categoryName: 
            newQuestCategory === 'body' ? '自訂身體動動' :
            newQuestCategory === 'vision' ? '自訂遠眺遠眺' :
            newQuestCategory === 'mind' ? '自訂眼部放鬆' : '自訂生活家事'
        };
        setCustomQuests(prev => [...prev, newQ]);
        setNewQuestText('');
      };

      const handleDeleteQuest = (id) => {
        setCustomQuests(prev => prev.filter(q => q.id !== id));
      };

      const formatTime = (seconds) => {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      };

      const calculateFatigue = () => {
        if (timerMode === 'screen') {
          const total = screenTimeSetting * 60;
          const spent = total - timeLeft;
          return Math.min(Math.round((spent / total) * 100), 100);
        }
        return 100; 
      };

      const handleQuickNoteClick = (noteText) => {
        if (soundEnabled) playSound('click');
        setRestingNote(prev => {
          const clean = prev.trim();
          if (!clean) return noteText;
          return `${clean}，並且${noteText}`;
        });
      };

      return (
        <div className="w-full max-w-md bg-gradient-to-b from-indigo-50 to-blue-50 rounded-[40px] shadow-2xl border-[10px] border-slate-800 overflow-hidden flex flex-col relative aspect-[9/19] max-h-[920px] mx-auto">
          
          {/* 手機頂部聽筒區 */}
          <div className="absolute top-0 inset-x-0 h-6 bg-slate-800 z-50 flex justify-center items-center">
            <div className="w-24 h-4 bg-slate-900 rounded-full flex justify-between px-4 items-center">
              <span className="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></span>
              <span className="w-10 h-1 bg-slate-700 rounded-full"></span>
            </div>
          </div>

          {/* 狀態列模擬 */}
          <div className="pt-8 px-6 pb-2 flex justify-between items-center text-xs font-bold text-slate-400 bg-white/40 backdrop-blur-sm z-40 border-b border-slate-100">
            <div className="flex items-center gap-1.5">
              <Icon name="tv" size={12} className="text-slate-500" />
              <span>護眼大冒險</span>
            </div>
            <div className="flex items-center gap-3">
              <button 
                onClick={() => { setSoundEnabled(!soundEnabled); playSound('click'); }} 
                className="p-1 rounded bg-slate-200 hover:bg-slate-300 transition text-slate-700"
                title="音效開關"
              >
                <Icon name={soundEnabled ? "volume-2" : "volume-x"} size={12} />
              </button>
              <button 
                onClick={openParentCorner} 
                className="p-1 rounded bg-orange-100 hover:bg-orange-200 text-orange-700 transition flex items-center gap-0.5"
              >
                <Icon name="settings" size={12} />
                <span>家長控制</span>
              </button>
            </div>
          </div>

          {/* 頂部水晶槽 */}
          <div className="bg-white/80 py-2.5 px-6 flex justify-between items-center shadow-sm z-30">
            <div className="flex items-center gap-2 bg-yellow-100 px-3 py-1 rounded-full border border-yellow-200 animate-pulse-slow">
              <span className="text-lg">💎</span>
              <span className="font-extrabold text-yellow-700 text-sm tracking-wider">{crystals} 水晶</span>
            </div>
            {gameState === 'dashboard' && (
              <div className="flex items-center gap-1 bg-red-50 border border-red-100 px-2.5 py-1 rounded-full text-xs">
                <span className="relative flex h-2 w-2">
                  <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                  <span className="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                </span>
                <span className="font-semibold text-red-600">疲勞值 {calculateFatigue()}%</span>
              </div>
            )}
          </div>

          {/* 遊戲主視窗 */}
          <div className="flex-1 overflow-y-auto p-5 flex flex-col justify-between no-scrollbar">
            
            {/* ==================== 1. 歡迎與選角頁面 ==================== */}
            {gameState === 'welcome' && (
              <div className="flex-1 flex flex-col justify-between py-2">
                <div className="text-center space-y-2 mt-4 animate-fade-in">
                  <div className="inline-block p-3 bg-indigo-100 rounded-2xl text-3xl mb-1">🛡️🌿</div>
                  <h1 className="text-2xl font-black text-indigo-900 tracking-tight">護眼小精靈</h1>
                  <p className="text-xs font-bold text-indigo-500 tracking-widest uppercase">的能量大冒險 v2.0</p>
                  <p className="text-xs text-slate-500 px-4">
                    用眼 20 分鐘，起立活動放鬆眼球！寫下你每一次的「眼球冒險放鬆日記」來賺取水晶吧！
                  </p>
                </div>

                <div className="my-5 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                  <label className="block text-xs font-extrabold text-slate-500 mb-2">請輸入小小冒險家名字：</label>
                  <input 
                    type="text" 
                    value={kidName}
                    onChange={(e) => setKidName(e.target.value)}
                    placeholder="小寶貝的名字..."
                    maxLength={8}
                    className="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-center font-bold text-slate-700 bg-slate-50/50"
                  />
                </div>

                <div>
                  <p className="text-xs font-extrabold text-slate-500 mb-2 text-center">選擇一位護眼精靈夥伴：</p>
                  <div className="grid grid-cols-3 gap-2.5">
                    {PIXIES.map((pixie) => (
                      <button
                        key={pixie.id}
                        onClick={() => { setSelectedPixieId(pixie.id); if (soundEnabled) playSound('click'); }}
                        className={`p-3 rounded-2xl border-2 flex flex-col items-center gap-1.5 transition-all ${
                          selectedPixieId === pixie.id 
                            ? `${pixie.borderColor} bg-white shadow-md scale-105` 
                            : 'border-transparent bg-slate-200/50 opacity-60 hover:opacity-100'
                        }`}
                      >
                        <span className="text-3xl">{pixie.emoji}</span>
                        <span className="text-xs font-black text-slate-700">{pixie.name.split(' ')[0]}</span>
                      </button>
                    ))}
                  </div>
                </div>

                <div className="mt-4 bg-white/70 p-3 rounded-xl text-xs text-slate-600 border border-slate-100 flex items-start gap-2 min-h-[64px]">
                  <span className="text-base">💡</span>
                  <div>
                    <span className="font-bold text-slate-800">夥伴介紹：</span>
                    {selectedPixie.desc}
                  </div>
                </div>

                <button
                  onClick={() => {
                    if (soundEnabled) playSound('success');
                    setGameState('dashboard');
                    setIsActive(true);
                    setTimeLeft(screenTimeSetting * 60);
                  }}
                  disabled={!kidName.trim()}
                  className={`w-full py-4 mt-6 rounded-2xl font-black text-white shadow-lg flex items-center justify-center gap-2 transition ${
                    kidName.trim() 
                      ? 'bg-gradient-to-r from-indigo-500 to-blue-600 hover:scale-102 active:scale-98' 
                      : 'bg-slate-300 cursor-not-allowed'
                  }`}
                >
                  <Icon name="play" size={18} fill="currentColor" />
                  <span>開啟護眼冒險！</span>
                </button>
              </div>
            )}

            {/* ==================== 2. 主控制台 (用眼計時與精靈陪伴) ==================== */}
            {gameState === 'dashboard' && (
              <div className="flex-1 flex flex-col justify-between py-2">
                
                {/* 測試沙盒 */}
                <div className="bg-amber-50 border border-amber-200 rounded-xl p-2 flex flex-col gap-1.5 mb-2 shadow-sm text-xs text-amber-800">
                  <div className="flex justify-between items-center font-bold">
                    <span>🛠️ 測試沙盒（供您快速體驗）：</span>
                    <span className="bg-amber-200 px-1.5 py-0.5 rounded text-[10px]">開發者工具</span>
                  </div>
                  <div className="flex gap-2">
                    <button 
                      onClick={() => { setIsSpeedUp(!isSpeedUp); if (soundEnabled) playSound('click'); }}
                      className={`flex-1 py-1 px-2 rounded font-bold text-center border transition text-[11px] ${
                        isSpeedUp ? 'bg-amber-600 text-white border-amber-700' : 'bg-white hover:bg-amber-100 border-amber-300'
                      }`}
                    >
                      🚀 {isSpeedUp ? '加速中 (100x)' : '標準時間 (可開加速)'}
                    </button>
                    <button 
                      onClick={forceTimeOut}
                      className="flex-1 py-1 px-2 bg-rose-500 hover:bg-rose-600 text-white font-bold rounded transition text-center text-[11px]"
                    >
                      ⏰ 模擬時間到！
                    </button>
                  </div>
                </div>

                {/* 精靈區 */}
                <div className="flex-1 flex flex-col items-center justify-center relative min-h-[160px]">
                  <div className="absolute inset-0 pointer-events-none flex flex-col items-center justify-center">
                    {equippedItems.head === 'party_hat' && (
                      <span className="text-4xl absolute -translate-y-20 translate-x-4 animate-bounce z-10">🥳</span>
                    )}
                    {equippedItems.head === 'gold_crown' && (
                      <span className="text-3xl absolute -translate-y-[84px] z-10 rotate-12">👑</span>
                    )}
                    {equippedItems.hand === 'magic_wand' && (
                      <span className="text-3xl absolute translate-x-16 translate-y-10 z-10 animate-pulse">🪄</span>
                    )}
                  </div>

                  <div className="relative">
                    {selectedPixie.svgBody(
                      selectedPixieId === 'alu' ? '#34d399' : selectedPixieId === 'momo' ? '#fb7185' : '#38bdf8',
                      calculateFatigue() >= 70, 
                      false 
                    )}
                    {equippedItems.eyes === 'cool_glasses' && (
                      <span className="text-4xl absolute left-1/2 top-[48%] -translate-x-1/2 -translate-y-1/2 z-10 select-none scale-x-125">🕶️</span>
                    )}
                  </div>

                  <div className="mt-2 bg-white px-4 py-1.5 rounded-2xl shadow-sm border border-slate-100 text-xs font-bold text-slate-600 max-w-[85%] text-center animate-pulse">
                    {calculateFatigue() < 30 && `哈囉，${kidName}！小夥伴正看著你快樂學習喔！`}
                    {calculateFatigue() >= 30 && calculateFatigue() < 70 && "看螢幕有一陣子了，多眨眼放鬆一下！"}
                    {calculateFatigue() >= 70 && "眼睛好累喔...等一下計時結束我們趕快休息！"}
                  </div>
                </div>

                {/* 計時器 */}
                <div className="bg-white p-5 rounded-3xl shadow-md border border-slate-100 space-y-4">
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-1.5">
                      <Icon name="tv" className="text-indigo-500" size={16} />
                      <span className="text-xs font-extrabold text-slate-500">當前：用眼看螢幕</span>
                    </div>
                    <span className="text-[10px] font-extrabold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-full">
                      寫日記賺 💎
                    </span>
                  </div>

                  <div className="flex items-center justify-between gap-4">
                    <div className="flex-1">
                      <div className="h-4 bg-slate-100 rounded-full overflow-hidden">
                        <div 
                          className="h-full bg-gradient-to-r from-indigo-400 to-indigo-600 transition-all duration-300"
                          style={{ width: `${(timeLeft / (screenTimeSetting * 60)) * 100}%` }}
                        ></div>
                      </div>
                      <div className="flex justify-between text-[10px] text-slate-400 font-bold mt-1">
                        <span>剩下 {Math.ceil(timeLeft / 60)} 分鐘</span>
                        <span>總時長 {screenTimeSetting} 分鐘</span>
                      </div>
                    </div>

                    <div className="text-2xl font-black text-slate-700 tabular-nums">
                      {formatTime(timeLeft)}
                    </div>
                  </div>

                  <div className="flex gap-2">
                    <button
                      onClick={() => {
                        if (soundEnabled) playSound('click');
                        setIsActive(!isActive);
                      }}
                      className={`flex-1 py-3 rounded-xl font-extrabold flex items-center justify-center gap-2 transition ${
                        isActive 
                          ? 'bg-amber-100 text-amber-700 hover:bg-amber-200 border border-amber-300' 
                          : 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-md'
                      }`}
                    >
                      {isActive ? <Icon name="pause" size={16} /> : <Icon name="play" size={16} fill="currentColor" />}
                      <span>{isActive ? '暫停計時' : '繼續守護'}</span>
                    </button>
                  </div>
                </div>

                <div className="mt-4 grid grid-cols-2 gap-2">
                  <button 
                    onClick={() => { if (soundEnabled) playSound('click'); setGameState('shop'); }}
                    className="bg-white/80 border border-indigo-100 hover:bg-indigo-50 py-3 px-4 rounded-2xl flex items-center justify-center gap-2 text-xs font-bold text-indigo-700 transition"
                  >
                    <Icon name="shopping-bag" size={14} />
                    <span>魔法商店</span>
                  </button>
                  <button 
                    onClick={() => { if (soundEnabled) playSound('click'); setGameState('closet'); }}
                    className="bg-white/80 border border-pink-100 hover:bg-pink-50 py-3 px-4 rounded-2xl flex items-center justify-center gap-2 text-xs font-bold text-pink-700 transition"
                  >
                    <Icon name="award" size={14} />
                    <span>精靈試衣間</span>
                  </button>
                </div>

              </div>
            )}

            {/* ==================== 3. 休息模式 (放鬆任務 + 雙眼日記) ==================== */}
            {gameState === 'resting' && (
              <div className="flex-1 flex flex-col justify-between py-1 animate-fade-in space-y-4">
                
                <div className="flex items-center justify-between">
                  <span className="px-3 py-1 bg-red-100 border border-red-200 text-red-700 rounded-full text-xs font-bold animate-pulse flex items-center gap-1">
                    <span>💤</span> 精靈充電休息中
                  </span>
                  <div className="flex items-center gap-1 text-xs text-slate-500 font-bold">
                    <Icon name="timer" size={14} />
                    <span>倒數: {formatTime(timeLeft)}</span>
                  </div>
                </div>

                <div className="bg-gradient-to-br from-indigo-500 to-indigo-700 text-white p-4 rounded-3xl shadow-lg relative overflow-hidden space-y-2">
                  <div className="absolute right-2 bottom-2 text-5xl opacity-10 select-none">🌿</div>
                  <div className="flex justify-between items-center">
                    <span className="text-[10px] font-black uppercase bg-white/20 px-2.5 py-0.5 rounded-full">
                      🏃 實體冒險任務
                    </span>
                    <span className="text-[10px] font-bold text-yellow-200">完成可記錄並賺取 💎</span>
                  </div>
                  <p className="text-xs font-bold leading-relaxed text-yellow-50">
                    {currentQuest?.text}
                  </p>
                </div>

                {/* 眼球冒險日記記錄區 */}
                <div className="bg-white p-4 rounded-3xl border border-indigo-100 shadow-sm space-y-4">
                  
                  {/* 眼睛舒適度評估 */}
                  <div className="space-y-2">
                    <label className="block text-xs font-black text-slate-700 flex items-center gap-1">
                      <Icon name="smile" size={14} className="text-indigo-500" />
                      <span>1. 做完任務，你現在的眼睛感覺如何？</span>
                    </label>
                    
                    <div className="grid grid-cols-3 gap-2">
                      <button
                        type="button"
                        onClick={() => { if (soundEnabled) playSound('click'); setEyeComfortScore('tired'); }}
                        className={`py-2 px-3 rounded-xl border flex flex-col items-center gap-1 transition ${
                          eyeComfortScore === 'tired' 
                            ? 'border-red-400 bg-red-50 text-red-600 font-bold scale-102 shadow-sm' 
                            : 'border-slate-100 bg-slate-50/50 text-slate-400 hover:bg-slate-50'
                        }`}
                      >
                        <span className="text-2xl">😣</span>
                        <span className="text-[10px]">還是有點酸</span>
                      </button>

                      <button
                        type="button"
                        onClick={() => { if (soundEnabled) playSound('click'); setEyeComfortScore('medium'); }}
                        className={`py-2 px-3 rounded-xl border flex flex-col items-center gap-1 transition ${
                          eyeComfortScore === 'medium' 
                            ? 'border-amber-400 bg-amber-50 text-amber-600 font-bold scale-102 shadow-sm' 
                            : 'border-slate-100 bg-slate-50/50 text-slate-400 hover:bg-slate-50'
                        }`}
                      >
                        <span className="text-2xl">😐</span>
                        <span className="text-[10px]">舒服了一點</span>
                      </button>

                      <button
                        type="button"
                        onClick={() => { if (soundEnabled) playSound('click'); setEyeComfortScore('good'); }}
                        className={`py-2 px-3 rounded-xl border flex flex-col items-center gap-1 transition ${
                          eyeComfortScore === 'good' 
                            ? 'border-emerald-400 bg-emerald-50 text-emerald-600 font-bold scale-102 shadow-sm' 
                            : 'border-slate-100 bg-slate-50/50 text-slate-400 hover:bg-slate-50'
                        }`}
                      >
                        <span className="text-2xl">😌</span>
                        <span className="text-[10px]">超級放鬆！</span>
                      </button>
                    </div>
                  </div>

                  {/* 成果文字輸入與快捷貼紙 */}
                  <div className="space-y-2">
                    <label className="block text-xs font-black text-slate-700 flex items-center gap-1">
                      <Icon name="pencil" size={14} className="text-indigo-500" />
                      <span>2. 填寫冒險日記（可自填或點選貼紙）</span>
                    </label>
                    
                    <textarea
                      rows={2}
                      value={restingNote}
                      onChange={(e) => setRestingNote(e.target.value)}
                      placeholder="例如：我看到窗外有三棵大樹、我閉上眼睛聽到了鳥叫聲！"
                      className="w-full p-2.5 text-xs border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 font-medium text-slate-600 resize-none bg-slate-50/50"
                    />

                    {/* 快捷貼紙 */}
                    <div className="space-y-1">
                      <p className="text-[9px] text-slate-400 font-bold">👉 快捷小貼紙（點擊一鍵記錄）：</p>
                      <div className="flex flex-wrap gap-1.5 max-h-[85px] overflow-y-auto pr-1 no-scrollbar">
                        {QUICK_NOTES.map((qn, idx) => (
                          <button
                            key={idx}
                            type="button"
                            onClick={() => handleQuickNoteClick(qn.text)}
                            className="text-[9px] bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-extrabold px-2 py-1 rounded-lg border border-indigo-100 transition active:scale-95"
                          >
                            {qn.text}
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>

                </div>

                {/* 沉睡小精靈 */}
                <div className="flex justify-center py-1">
                  <div className="relative scale-75 origin-center">
                    <span className="absolute text-xl font-bold text-indigo-400 -translate-y-12 translate-x-12 animate-bounce-slow">Zzz</span>
                    {selectedPixie.svgBody(
                      selectedPixieId === 'alu' ? '#047857' : selectedPixieId === 'momo' ? '#be123c' : '#0369a1',
                      true,
                      true
                    )}
                  </div>
                </div>

                <div className="space-y-1">
                  <button
                    onClick={completeBreakSuccess}
                    className="w-full py-3.5 bg-gradient-to-r from-emerald-500 to-teal-600 hover:scale-102 text-white font-black rounded-2xl shadow-lg flex items-center justify-center gap-2 transition"
                  >
                    <Icon name="check-circle" size={18} />
                    <span>儲存日記並獲得能量！</span>
                  </button>
                  <div className="text-center text-[10px] text-slate-400 font-semibold">
                    * 寫好日記再點擊提交，能獲得更豐富的水晶獎勵喔！
                  </div>
                </div>

              </div>
            )}

            {/* ==================== 4. 成功與收穫頁面 ==================== */}
            {gameState === 'success' && (
              <div className="flex-1 flex flex-col justify-between py-2 text-center animate-fade-in">
                <div className="space-y-1 mt-2">
                  <div className="inline-block p-3 bg-yellow-100 rounded-full text-3xl animate-pulse">
                    🎉💎✨
                  </div>
                  <h2 className="text-xl font-black text-indigo-900">太棒了，完成充電！</h2>
                  <p className="text-xs text-slate-500 px-6">
                    {kidName} 的眼睛重獲能量！看看你剛剛寫下的紀錄吧：
                  </p>
                </div>

                {/* 剛剛儲存的日記展示 */}
                {lastSavedLog && (
                  <div className="my-2 bg-white/90 border-2 border-dashed border-indigo-200 p-4 rounded-3xl max-w-[90%] mx-auto shadow-sm text-left relative overflow-hidden">
                    <div className="absolute right-2 top-2 text-2xl opacity-10 font-bold select-none">
                      📖
                    </div>
                    
                    <div className="flex items-center gap-1.5 border-b border-indigo-50 pb-2 mb-2">
                      <span className="text-lg">
                        {lastSavedLog.comfort === 'good' ? '😌' : lastSavedLog.comfort === 'medium' ? '😐' : '😣'}
                      </span>
                      <div>
                        <h4 className="text-xs font-black text-slate-800">眼球探險日記成果</h4>
                        <p className="text-[9px] text-slate-400 font-semibold">{lastSavedLog.time}</p>
                      </div>
                    </div>

                    <p className="text-xs font-bold text-indigo-900 bg-indigo-50/50 p-2 rounded-xl italic leading-relaxed">
                      「 {lastSavedLog.note} 」
                    </p>

                    <div className="mt-3 flex justify-between items-center text-[10px] text-slate-500 font-bold">
                      <span>雙眼放鬆度評分：</span>
                      <span className={`px-2 py-0.5 rounded-full text-[9px] ${
                        lastSavedLog.comfort === 'good' ? 'bg-emerald-50 text-emerald-600 border border-emerald-100' :
                        lastSavedLog.comfort === 'medium' ? 'bg-amber-50 text-amber-600 border border-amber-100' :
                        'bg-red-50 text-red-600 border border-red-100'
                      }`}>
                        {lastSavedLog.comfort === 'good' ? '超級放鬆！' : lastSavedLog.comfort === 'medium' ? '舒服了一點' : '依然有點累'}
                      </span>
                    </div>
                  </div>
                )}

                <div className="my-2 flex flex-col items-center justify-center">
                  <div className="animate-bounce">
                    {selectedPixie.svgBody(
                      selectedPixieId === 'alu' ? '#10b981' : selectedPixieId === 'momo' ? '#f43f5e' : '#0ea5e9',
                      false, 
                      false  
                    )}
                  </div>
                  <p className="text-[10px] font-black text-emerald-600 bg-emerald-50 px-2.5 py-0.5 rounded-full border border-emerald-100 mt-2">
                    ✨ 獲得水晶 💎 {lastSavedLog?.reward || 20} 枚！
                  </p>
                </div>

                <button
                  onClick={startNextScreenSession}
                  className="w-full py-4 bg-gradient-to-r from-indigo-500 to-blue-600 hover:scale-102 text-white font-black rounded-2xl shadow-lg flex items-center justify-center gap-2 transition"
                >
                  <span>進入下一回合守護</span>
                  <Icon name="chevron-right" size={18} />
                </button>
              </div>
            )}

            {/* ==================== 5. 魔法商店 ==================== */}
            {gameState === 'shop' && (
              <div className="flex-1 flex flex-col justify-between py-1 animate-fade-in">
                <div className="flex items-center justify-between border-b border-slate-100 pb-3">
                  <div className="flex items-center gap-1.5">
                    <Icon name="shopping-bag" className="text-indigo-600" size={18} />
                    <h2 className="text-md font-black text-slate-800">精靈魔法商店</h2>
                  </div>
                  <button 
                    onClick={() => { if (soundEnabled) playSound('click'); setGameState('dashboard'); }}
                    className="text-xs font-bold text-slate-400 hover:text-slate-600 animate-pulse"
                  >
                    返回小屋 ➔
                  </button>
                </div>

                <div className="flex-1 overflow-y-auto my-3 space-y-2.5 max-h-[380px] pr-1 no-scrollbar">
                  {SHOP_ITEMS.map((item) => {
                    const isOwned = ownedItems.includes(item.id);
                    return (
                      <div 
                        key={item.id} 
                        className="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between gap-3"
                      >
                        <div className="flex items-center gap-3">
                          <span className="text-3xl bg-slate-100 p-2 rounded-xl">{item.emoji}</span>
                          <div>
                            <p className="text-xs font-black text-slate-800">{item.name}</p>
                            <p className="text-[10px] text-slate-400">穿戴後小精靈更可愛喔！</p>
                          </div>
                        </div>

                        <div>
                          {isOwned ? (
                            <span className="text-xs font-bold text-slate-400 bg-slate-100 px-3 py-1.5 rounded-full">
                              已擁有
                            </span>
                          ) : (
                            <button
                              onClick={() => buyItem(item)}
                              disabled={crystals < item.price}
                              className={`px-3 py-1.5 rounded-full font-black text-xs transition flex items-center gap-1 ${
                                crystals >= item.price 
                                  ? 'bg-yellow-400 hover:bg-yellow-500 text-yellow-950' 
                                  : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                              }`}
                            >
                              <span>💎 {item.price}</span>
                            </button>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>

                <button
                  onClick={() => { if (soundEnabled) playSound('click'); setGameState('dashboard'); }}
                  className="w-full py-3 bg-slate-200 hover:bg-slate-300 text-slate-700 font-extrabold rounded-xl transition text-xs"
                >
                  返回精靈小屋
                </button>
              </div>
            )}

            {/* ==================== 6. 精靈試衣間 ==================== */}
            {gameState === 'closet' && (
              <div className="flex-1 flex flex-col justify-between py-1 animate-fade-in">
                <div className="flex items-center justify-between border-b border-slate-100 pb-3">
                  <div className="flex items-center gap-1.5">
                    <Icon name="award" className="text-pink-600" size={18} />
                    <h2 className="text-md font-black text-slate-800">精靈試衣間</h2>
                  </div>
                  <button 
                    onClick={() => { if (soundEnabled) playSound('click'); setGameState('dashboard'); }}
                    className="text-xs font-bold text-slate-400 hover:text-slate-600"
                  >
                    返回小屋 ➔
                  </button>
                </div>

                <div className="my-4 flex flex-col items-center justify-center relative bg-white/40 rounded-2xl p-4 border border-slate-100">
                  <div className="relative">
                    {selectedPixie.svgBody(
                      selectedPixieId === 'alu' ? '#10b981' : selectedPixieId === 'momo' ? '#f43f5e' : '#0ea5e9',
                      false, false
                    )}
                    {equippedItems.head === 'party_hat' && (
                      <span className="text-4xl absolute -translate-y-[100px] translate-x-12 z-10 animate-bounce">🥳</span>
                    )}
                    {equippedItems.head === 'gold_crown' && (
                      <span className="text-3xl absolute -translate-y-[84px] z-10 rotate-12">👑</span>
                    )}
                    {equippedItems.eyes === 'cool_glasses' && (
                      <span className="text-4xl absolute left-1/2 top-[48%] -translate-x-1/2 -translate-y-1/2 z-10 select-none scale-x-125">🕶️</span>
                    )}
                    {equippedItems.hand === 'magic_wand' && (
                      <span className="text-3xl absolute translate-x-16 translate-y-10 z-10 animate-pulse">🪄</span>
                    )}
                  </div>
                </div>

                <div className="flex-1 overflow-y-auto max-h-[220px] mb-3 no-scrollbar">
                  <p className="text-xs font-extrabold text-slate-500 mb-2">已擁有的服飾：</p>
                  {ownedItems.length === 0 ? (
                    <div className="text-center py-8 bg-white/50 rounded-2xl text-xs text-slate-400">
                      目前衣櫃裡空空的，快去魔法商店買新衣服吧！🛒
                    </div>
                  ) : (
                    <div className="grid grid-cols-2 gap-2">
                      {SHOP_ITEMS.filter(item => ownedItems.includes(item.id)).map((item) => {
                        const isEquipped = equippedItems[item.type] === item.id;
                        return (
                          <button
                            key={item.id}
                            onClick={() => toggleEquipItem(item)}
                            className={`p-3 rounded-xl border flex items-center gap-2 transition ${
                              isEquipped 
                                ? 'border-pink-400 bg-pink-50 text-pink-700 font-extrabold' 
                                : 'border-slate-200 bg-white text-slate-700 hover:bg-slate-50'
                            }`}
                          >
                            <span className="text-2xl">{item.emoji}</span>
                            <div className="text-left">
                              <p className="text-xs font-bold leading-none">{item.name}</p>
                              <p className="text-[9px] text-slate-400 mt-1">{isEquipped ? '脫下' : '穿上'}</p>
                            </div>
                          </button>
                        );
                      })}
                    </div>
                  )}
                </div>

                <button
                  onClick={() => { if (soundEnabled) playSound('click'); setGameState('dashboard'); }}
                  className="w-full py-3 bg-slate-200 hover:bg-slate-300 text-slate-700 font-extrabold rounded-xl transition text-xs"
                >
                  確定造型
                </button>
              </div>
            )}

          </div>

          {/* ==================== 7. 家長控制台 Modal (安全心算鎖 + 成果審查) ==================== */}
          {parentModalOpen && (
            <div className="absolute inset-0 bg-slate-900/85 backdrop-blur-sm z-50 flex items-end justify-center">
              <div className="w-full bg-white rounded-t-[32px] p-6 space-y-4 max-h-[90%] overflow-y-auto animate-slide-up no-scrollbar">
                
                <div className="flex justify-between items-center border-b border-slate-100 pb-3">
                  <div className="flex items-center gap-2">
                    <Icon name="lock" size={18} className="text-orange-500" />
                    <h3 className="text-md font-black text-slate-800">家長控制與冒險日記中心</h3>
                  </div>
                  <button 
                    onClick={() => { if (soundEnabled) playSound('click'); setParentModalOpen(false); }}
                    className="text-xs text-slate-400 font-bold hover:text-slate-600"
                  >
                    關閉 ✕
                  </button>
                </div>

                {/* 心算防誤觸驗證鎖 */}
                {!parentPinSolved ? (
                  <div className="space-y-4 py-4 text-center">
                    <div className="inline-block p-2 bg-orange-100 rounded-xl text-orange-600 mb-1">
                      <Icon name="shield-alert" size={20} />
                    </div>
                    <p className="text-xs text-slate-500">
                      此區域包含孩子實體任務日記。請大人解答下方算術鎖進入：
                    </p>
                    <div className="bg-slate-100 py-3 rounded-2xl text-lg font-black text-slate-700 tracking-wider">
                      {parentMathQuiz.num1} × {parentMathQuiz.num2} = ?
                    </div>
                    
                    {/* 心算錯誤友善提示區 (符合無 browser alert 原則) */}
                    {parentError && (
                      <p className="text-xs font-bold text-red-500 bg-red-50 p-2 rounded-xl border border-red-100 animate-shake">
                        ⚠️ {parentError}
                      </p>
                    )}

                    <div className="flex gap-2">
                      <input 
                        type="number" 
                        value={parentMathQuiz.ans}
                        onChange={(e) => setParentMathQuiz(prev => ({ ...prev, ans: e.target.value }))}
                        placeholder="輸入答案"
                        className="flex-1 px-4 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400 text-center font-bold"
                      />
                      <button
                        onClick={verifyParentAnswer}
                        className="px-6 py-2 bg-orange-500 hover:bg-orange-600 text-white font-extrabold rounded-xl transition text-sm"
                      >
                        驗證
                      </button>
                    </div>
                  </div>
                ) : (
                  // 家長中心主控面板
                  <div className="space-y-5">
                    
                    {/* 探險日記審查 */}
                    <div className="space-y-2">
                      <h4 className="text-xs font-black text-slate-700 flex items-center gap-1">
                        <Icon name="book-open" size={14} className="text-indigo-600" />
                        <span>✨ 孩子寫下的「護眼充電日記」({historyLogs.length})</span>
                      </h4>
                      
                      <div className="bg-slate-50 rounded-xl p-2.5 max-h-[160px] overflow-y-auto space-y-2 border border-slate-150 no-scrollbar">
                        {historyLogs.map(log => (
                          <div key={log.id} className="bg-white p-2.5 rounded-lg border border-slate-100 text-xs shadow-2xs">
                            <div className="flex justify-between items-center border-b border-slate-50 pb-1.5 mb-1.5 text-[10px]">
                              <div className="flex items-center gap-1.5">
                                <span className="text-xs">
                                  {log.comfort === 'good' ? '😌' : log.comfort === 'medium' ? '😐' : '😣'}
                                </span>
                                <span className="text-slate-400 font-semibold">{log.time}</span>
                              </div>
                              <span className="text-yellow-600 font-black">💎 +{log.reward}</span>
                            </div>
                            <div className="space-y-1 text-[11px]">
                              <p className="font-extrabold text-indigo-900">{log.action}</p>
                              <p className="text-slate-600 bg-indigo-50/20 p-1.5 rounded-md italic">
                                📝 「 {log.note} 」
                              </p>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* 用眼/休息時間設定 */}
                    <div className="space-y-2">
                      <h4 className="text-xs font-black text-slate-700 flex items-center gap-1">
                        <Icon name="timer" size={14} />
                        <span>1. 用眼與休息時間設定</span>
                      </h4>
                      <div className="grid grid-cols-2 gap-3">
                        <div className="bg-slate-50 p-3 rounded-xl border border-slate-150">
                          <label className="block text-[10px] text-slate-500 font-extrabold mb-1">螢幕使用時間</label>
                          <div className="flex items-center gap-1.5">
                            <input 
                              type="number" 
                              min={1} 
                              max={60}
                              value={screenTimeSetting}
                              onChange={(e) => {
                                const v = Math.max(1, parseInt(e.target.value) || 20);
                                setScreenTimeSetting(v);
                                if (timerMode === 'screen') setTimeLeft(v * 60);
                              }}
                              className="w-16 px-1.5 py-1 text-center font-black border rounded text-xs"
                            />
                            <span className="text-xs text-slate-600 font-bold">分鐘</span>
                          </div>
                        </div>

                        <div className="bg-slate-50 p-3 rounded-xl border border-slate-150">
                          <label className="block text-[10px] text-slate-500 font-extrabold mb-1">休息放鬆時間</label>
                          <div className="flex items-center gap-1.5">
                            <input 
                              type="number" 
                              min={1} 
                              max={30}
                              value={breakTimeSetting}
                              onChange={(e) => {
                                const v = Math.max(1, parseInt(e.target.value) || 5);
                                setBreakTimeSetting(v);
                                if (timerMode === 'break') setTimeLeft(v * 60);
                              }}
                              className="w-16 px-1.5 py-1 text-center font-black border rounded text-xs"
                            />
                            <span className="text-xs text-slate-600 font-bold">分鐘</span>
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* 自訂實體充電任務 */}
                    <div className="space-y-2">
                      <h4 className="text-xs font-black text-slate-700 flex items-center gap-1">
                        <Icon name="plus" size={14} />
                        <span>2. 自訂實體充電任務 (共 {customQuests.length} 個)</span>
                      </h4>
                      
                      <form onSubmit={handleAddQuest} className="space-y-2">
                        <div className="flex gap-2">
                          <select 
                            value={newQuestCategory}
                            onChange={(e) => setNewQuestCategory(e.target.value)}
                            className="px-2 py-1.5 bg-slate-100 border rounded-lg text-xs font-bold focus:outline-none"
                          >
                            <option value="body">🏃‍♂️ 動肢體</option>
                            <option value="vision">👁️ 望遠遠眺</option>
                            <option value="mind">🧘 眼放鬆</option>
                            <option value="chore">🧹 輕家事</option>
                          </select>
                          <input 
                            type="text" 
                            value={newQuestText}
                            onChange={(e) => setNewQuestText(e.target.value)}
                            placeholder="自訂新任務..."
                            className="flex-1 px-3 py-1.5 border rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-indigo-400"
                          />
                        </div>
                        <button 
                          type="submit" 
                          className="w-full py-1.5 bg-indigo-600 text-white hover:bg-indigo-700 font-extrabold rounded-lg text-xs transition"
                        >
                          ＋ 加入實體任務庫
                        </button>
                      </form>

                      <div className="bg-slate-50 rounded-xl p-2 max-h-[120px] overflow-y-auto space-y-1.5 border border-slate-150 no-scrollbar">
                        {customQuests.map((q) => (
                          <div key={q.id} className="flex justify-between items-start bg-white p-2 rounded-lg border border-slate-100 text-[11px] gap-2">
                            <div className="flex-1">
                              <span className="font-extrabold text-[9px] px-1.5 py-0.5 rounded bg-slate-100 text-slate-500 mr-1.5">
                                {q.categoryName}
                              </span>
                              <span className="text-slate-600">{q.text}</span>
                            </div>
                            <button 
                              type="button"
                              onClick={() => handleDeleteQuest(q.id)}
                              className="text-red-500 hover:text-red-700 p-0.5"
                            >
                              <Icon name="trash-2" size={12} />
                            </button>
                          </div>
                        ))}
                      </div>
                    </div>

                  </div>
                )}

                <button
                  onClick={() => { if (soundEnabled) playSound('click'); setParentModalOpen(false); }}
                  className="w-full py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-extrabold rounded-xl transition text-xs mt-2"
                >
                  關閉並返回
                </button>
              </div>
            </div>
          )}

        </div>
      );
    }

    // 將 React 應用程式渲染至頁面
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
