        if (!AudioContext) return;

        if (type === 'click') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(600, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.08, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.1);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + 0.1);
        } else if (type === 'success') {
          const now = ctx.currentTime;
          const freqs = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
          freqs.forEach((f, i) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = f;
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.1, now + i * 0.08 + 0.02);
            gain.gain.linearRampToValueAtTime(0, now + i * 0.08 + 0.2);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now + i * 0.08);
            osc.stop(now + i * 0.08 + 0.2);
          });
        } else if (type === 'alarm') {
          const now = ctx.currentTime;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(320, now);
          osc.frequency.linearRampToValueAtTime(480, now + 0.15);
          osc.frequency.linearRampToValueAtTime(320, now + 0.3);
          gain.gain.setValueAtTime(0.08, now);
          gain.gain.linearRampToValueAtTime(0.08, now + 0.2);
          gain.gain.linearRampToValueAtTime(0, now + 0.3);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(now + 0.3);
        } else if (type === 'snore') {
          const now = ctx.currentTime;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(110, now);

          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(now + 1.0);
        }

      { id: 7, text: '🦒【長頸鹿伸展】雙手高高舉起指向天空，脖子慢慢往上看、再左右緩慢轉動，像長頸鹿在吃高處的樹葉。', category: 'body', categoryName: '全身大伸展', minScreenTime: 30 }
    ];

    // --- 快捷貼紙設定 ---
    const QUICK_NOTES = [
      { text: '🌲 看到了窗外茂盛的綠色大樹', category: 'vision' },
      { text: '☁️ 看到天空中飄過去一朵可愛的雲', category: 'vision' },
      { text: '🦘 在客廳安全的地方用力跳了15下', category: 'body' },
      { text: '🦒 像長頸鹿一樣做了全身大伸展', category: 'body' },
      { text: '🕊️ 閉上眼睛聽到了外面的小鳥叫聲', category: 'mind' },
      { text: '🚗 聽到馬路上大卡車開過去的聲音', category: 'mind' },
      { text: '🧦 認真幫爸爸媽媽摺好了3雙襪子', category: 'chore' },
      { text: '🥛 自己把喝完水的水杯洗好放整齊', category: 'chore' }
    ];

    function App() {
      // --- 核心遊戲狀態 ---
      const [gameState, setGameState] = useState('welcome'); 
      const [kidName, setKidName] = useState('');
      const [selectedPixieId, setSelectedPixieId] = useState('alu');
      const [soundEnabled, setSoundEnabled] = useState(true);
      
      // 遊戲幣與衣櫃
      const [crystals, setCrystals] = useState(100); 
      const [ownedItems, setOwnedItems] = useState([]);
      const [equippedItems, setEquippedItems] = useState({ head: null, eyes: null, hand: null, bed: null });

      // 倒數計時狀態 (用眼/休息)
      const [timerMode, setTimerMode] = useState('screen'); 
      const [screenTimeSetting, setScreenTimeSetting] = useState(20); // 家長可自由設定的用眼分鐘數
      const [breakTimeSetting, setBreakTimeSetting] = useState(5); 
      const [timeLeft, setTimeLeft] = useState(20 * 60);
      const [isActive, setIsActive] = useState(false);
      const [isSpeedUp, setIsSpeedUp] = useState(false); 
      
      // 當前隨機抽取任務
      const [currentQuest, setCurrentQuest] = useState(null);

      // 休息日記記錄
      const [restingNote, setRestingNote] = useState(''); 
      const [eyeComfortScore, setEyeComfortScore] = useState('good'); 
      const [lastSavedLog, setLastSavedLog] = useState(null); 

      // 歷史數據紀錄
      const [historyLogs, setHistoryLogs] = useState([
        { id: 1, time: '早上 09:30', name: '綠萌萌', action: '完成「遠眺放鬆」任務', note: '看著窗外好高好綠的大王椰子樹！', comfort: 'good', reward: 15 },
        { id: 2, time: '下午 02:15', name: '綠萌萌', action: '完成「大肌肉消耗」任務', note: '連續跳了15下，身體都熱烘烘的了！', comfort: 'medium', reward: 20 }
      ]);
      
      // 家長中心
      const [parentModalOpen, setParentModalOpen] = useState(false);
      const [parentPinSolved, setParentPinSolved] = useState(false);
      const [parentMathQuiz, setParentMathQuiz] = useState({ num1: 0, num2: 0, ans: '' });
      const [parentError, setParentError] = useState(''); 
      const [customQuests, setCustomQuests] = useState(DEFAULT_QUESTS);
      const [newQuestText, setNewQuestText] = useState('');
      const [newQuestCategory, setNewQuestCategory] = useState('body');
      const [newQuestMinTime, setNewQuestMinTime] = useState(15); // 新自訂任務的門檻時間

      const selectedPixie = PIXIES.find(p => p.id === selectedPixieId) || PIXIES[0];
      const timerRef = useRef(null);

      // 測試沙盒：直接觸發時間到
      const forceTimeOut = () => {
        if (soundEnabled) playSound('alarm');
        setIsActive(false);
        triggerBreakMode();
      };

      // 觸發休息模式：!!! 核心重構：依據家長設定用眼時間 (screenTimeSetting) 智慧派發相對應任務 !!!
      const triggerBreakMode = () => {
        setTimerMode('break');
        setTimeLeft(breakTimeSetting * 60);
        setRestingNote('');
        setEyeComfortScore('good');
        
        // 篩選最適合當前家長設定用眼時間的任務
        // 如果用眼設定很短 (<=15分鐘)，只篩選 minScreenTime <= 15 的任務 (偏向輕柔眼部操)
        // 如果用眼設定中等 (16-29分鐘)，篩選 minScreenTime <= 20 的任務
        // 如果用眼設定很長 (>=30分鐘)，篩選涵蓋 minScreenTime >= 30 (偏向全身大肌肉運動) 的任務
        let eligibleQuests = customQuests.filter(q => screenTimeSetting >= q.minScreenTime);
        
        // 保險防呆機制：若當前符合條件的任務清單為空，則直接取全部任務
        if (eligibleQuests.length === 0) {
          eligibleQuests = customQuests;
        }

        const randomIndex = Math.floor(Math.random() * eligibleQuests.length);
        setCurrentQuest(eligibleQuests[randomIndex]);
        setGameState('resting');
        setIsActive(true);
      };

      // 計時器核心
      useEffect(() => {
        if (isActive && timeLeft > 0) {
          const intervalSpeed = isSpeedUp ? 10 : 1000; 
          timerRef.current = setTimeout(() => {
            if (timerMode === 'break' && timeLeft % 15 === 0 && soundEnabled) {
              playSound('snore');
            }
            
            setTimeLeft(prev => {
              if (prev <= 1) {
                clearTimeout(timerRef.current);
                handleTimerComplete();
                return 0;
              }
              return prev - 1;
            });
          }, intervalSpeed);
        } else if (timeLeft === 0 && isActive) {
          handleTimerComplete();
        }

        return () => clearTimeout(timerRef.current);
      }, [isActive, timeLeft, isSpeedUp, timerMode]);

      // 時間結束處理
      const handleTimerComplete = () => {
        setIsActive(false);
        if (timerMode === 'screen') {
          forceTimeOut();
        } else {
          completeBreakSuccess();
        }
      };

      // 完成任務並儲存記錄
      const completeBreakSuccess = () => {
        if (soundEnabled) playSound('success');
        setIsActive(false);
        
        const crystalsEarned = Math.floor(Math.random() * 11) + 15; 
        setCrystals(prev => prev + crystalsEarned);
        
        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
        const formattedNote = restingNote.trim() || '跟著小精靈完成了伸展與眼部休息！';
        
        const newLog = {
          id: Date.now(),
          time: `今天 ${timeStr}`,
          name: selectedPixie.name,
          action: `完成「${currentQuest?.categoryName || '健康放鬆'}」任務`,
          note: formattedNote,
          comfort: eyeComfortScore,
          reward: crystalsEarned
        };
        
        setHistoryLogs(prev => [newLog, ...prev]);
        setLastSavedLog(newLog); 
        setGameState('success');
      };

      // 重置並開始新循環
      const startNextScreenSession = () => {
        if (soundEnabled) playSound('click');
        setTimerMode('screen');
        setTimeLeft(screenTimeSetting * 60);
        setGameState('dashboard');
        setIsActive(true);
      };

      // 生成家長驗證問答
      const openParentCorner = () => {
        if (soundEnabled) playSound('click');
        const n1 = Math.floor(Math.random() * 8) + 3;
        const n2 = Math.floor(Math.random() * 8) + 3;
        setParentMathQuiz({ num1: n1, num2: n2, ans: '' });
        setParentPinSolved(false);
        setParentError('');
        setParentModalOpen(true);
      };

      // 驗證家長問答 (無 browser alert)
      const verifyParentAnswer = () => {
        const correctAnswer = parentMathQuiz.num1 * parentMathQuiz.num2;
        if (parseInt(parentMathQuiz.ans) === correctAnswer) {
          setParentPinSolved(true);
          setParentError('');
          if (soundEnabled) playSound('success');
        } else {
          if (soundEnabled) playSound('alarm');
          setParentError('算錯囉！請重新嘗試，或請爸爸媽媽來幫忙！');
          const n1 = Math.floor(Math.random() * 8) + 3;
          const n2 = Math.floor(Math.random() * 8) + 3;
          setParentMathQuiz({ num1: n1, num2: n2, ans: '' });
        }
      };

      // 商店購買與穿戴
      const buyItem = (item) => {
        if (crystals >= item.price && !ownedItems.includes(item.id)) {
          if (soundEnabled) playSound('success');
          setCrystals(prev => prev - item.price);
          setOwnedItems(prev => [...prev, item.id]);
        } else {
          if (soundEnabled) playSound('alarm');
        }
      };

      const toggleEquipItem = (item) => {
        if (soundEnabled) playSound('click');
        setEquippedItems(prev => {
          const type = item.type;
          if (prev[type] === item.id) {
            return { ...prev, [type]: null }; 
          } else {
            return { ...prev, [type]: item.id }; 
          }
        });
      };

      // 新增自訂任務 (包含家長指派的時間門檻)
      const handleAddQuest = (e) => {
        e.preventDefault();
        if (!newQuestText.trim()) return;
        const newQ = {
          id: Date.now(),
          text: newQuestText,
          category: newQuestCategory,
          categoryName: 
            newQuestCategory === 'body' ? '自訂肢體運動' :
            newQuestCategory === 'vision' ? '自訂綠化遠眺' :
            newQuestCategory === 'mind' ? '自訂心靈放鬆' : '自訂輕家事學',
          minScreenTime: parseInt(newQuestMinTime) || 0
        };
        setCustomQuests(prev => [...prev, newQ]);
        setNewQuestText('');
      };

      const handleDeleteQuest = (id) => {
        setCustomQuests(prev => prev.filter(q => q.id !== id));
      };

      const formatTime = (seconds) => {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      };

      const calculateFatigue = () => {
        if (timerMode === 'screen') {
          const total = screenTimeSetting * 60;
          const spent = total - timeLeft;
          return Math.min(Math.round((spent / total) * 100), 100);
        }
        return 100; 
      };

      const handleQuickNoteClick = (noteText) => {
        if (soundEnabled) playSound('click');
        setRestingNote(prev => {
          const clean = prev.trim();
          if (!clean) return noteText;
          return `${clean}，並且${noteText}`;
        });
      };

      return (
        /* 全載具自我適應外框：在手機上無縫滿版(100dvh)，在平板與電腦桌面上自動收窄為優雅的外框 */
        <div className="w-full sm:max-w-md bg-gradient-to-b from-indigo-50 to-blue-50 sm:rounded-[36px] shadow-2xl sm:border-[8px] border-slate-800 overflow-hidden flex flex-col relative h-[100dvh] sm:h-[860px] md:h-[900px] transition-all">
          
          {/* 行動端頂部避讓劉海區 (僅在 sm 以上顯示裝飾，手機滿版直接微調 padding-top 實現流暢全螢幕) */}
          <div className="hidden sm:flex absolute top-0 inset-x-0 h-6 bg-slate-800 z-50 justify-center items-center">
            <div className="w-24 h-4 bg-slate-900 rounded-full flex justify-between px-4 items-center">
              <span className="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></span>
              <span className="w-10 h-1 bg-slate-700 rounded-full"></span>
            </div>
          </div>

          {/* 頂部導航列 - 智慧留出安全邊距 (IOS SafeArea 支援) */}
          <div className="pt-4 sm:pt-8 px-5 pb-2 flex justify-between items-center text-xs font-bold text-slate-400 bg-white/50 backdrop-blur-sm z-40 border-b border-slate-100">
            <div className="flex items-center gap-1.5">
              <Icon name="tv" size={13} className="text-indigo-600" />
              <span className="text-slate-600">眼部大冒險 v3.0</span>
            </div>
            <div className="flex items-center gap-3">
              <button 
                onClick={() => { setSoundEnabled(!soundEnabled); playSound('click'); }} 
                className="p-1.5 rounded-lg bg-slate-200/80 hover:bg-slate-300 active:scale-90 transition text-slate-700 flex items-center justify-center"
                title="音效開關"
              >
                <Icon name={soundEnabled ? "volume-2" : "volume-x"} size={13} />
              </button>
              <button 
                onClick={openParentCorner} 
                className="p-1.5 rounded-lg bg-orange-100 hover:bg-orange-200 text-orange-700 active:scale-90 transition flex items-center gap-1 font-black"
              >
                <Icon name="settings" size={12} />
                <span>家長設定</span>
              </button>
            </div>
          </div>

          {/* 能量計量展示列 */}
          <div className="bg-white/90 py-2 px-5 flex justify-between items-center shadow-sm z-30">
            <div className="flex items-center gap-1.5 bg-yellow-100/80 px-3 py-1 rounded-full border border-yellow-200 animate-pulse-slow">
              <span className="text-base">💎</span>
              <span className="font-extrabold text-yellow-800 text-xs tracking-wider">{crystals} 水晶</span>
            </div>
            {gameState === 'dashboard' && (
              <div className="flex items-center gap-1.5 bg-red-50 border border-red-100 px-2.5 py-1 rounded-full text-xs">
                <span className="relative flex h-2 w-2">
                  <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                  <span className="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                </span>
                <span className="font-bold text-red-600">疲勞值 {calculateFatigue()}%</span>
              </div>
            )}
          </div>

          {/* 遊戲主視窗 - 使用 flex-1 自適應延伸，杜絕行動端裁剪與滾動溢出 */}
          <div className="flex-1 overflow-y-auto px-5 py-4 flex flex-col justify-between no-scrollbar">
            
            {/* ==================== 1. 歡迎與選角頁面 ==================== */}
            {gameState === 'welcome' && (
              <div className="flex-1 flex flex-col justify-between py-1 animate-fade-in">
                <div className="text-center space-y-2 mt-2">
                  <div className="inline-block p-3.5 bg-indigo-100/80 rounded-2xl text-4xl mb-1 shadow-sm">🌿🧚‍♂️</div>
                  <h1 className="text-2xl font-black text-indigo-900 tracking-tight">護眼小精靈</h1>
                  <p className="text-xs font-black text-indigo-500 tracking-widest uppercase">的能量大冒險 v3.0</p>
                  <p className="text-xs text-slate-500 px-3 leading-relaxed">
                    看螢幕 20 分鐘，活動眼睛一下！系統會依家長設定的時間派發輕微舒緩或中高強度肢體運動任務！
                  </p>
                </div>

                {/* 輸入名字 */}
                <div className="my-4 bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                  <label className="block text-xs font-black text-slate-500 mb-2">請輸入小小冒險家名字：</label>
                  <input 
                    type="text" 
                    value={kidName}
                    onChange={(e) => setKidName(e.target.value)}
                    placeholder="小寶貝的名字..."
                    maxLength={8}
                    className="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-center font-black text-slate-700 bg-slate-50/50"
                  />
                </div>

                {/* 選擇小夥伴 */}
                <div className="space-y-2">
                  <p className="text-xs font-black text-slate-500 text-center">請點選一位護眼夥伴：</p>
                  <div className="grid grid-cols-3 gap-2.5">
                    {PIXIES.map((pixie) => (
                      <button
                        key={pixie.id}
                        onClick={() => { setSelectedPixieId(pixie.id); if (soundEnabled) playSound('click'); }}
                        className={`p-2.5 rounded-2xl border-2 flex flex-col items-center gap-1 transition-all active:scale-95 ${
                          selectedPixieId === pixie.id 
                            ? `${pixie.borderColor} bg-white shadow-md scale-105` 
                            : 'border-transparent bg-slate-200/40 opacity-70 hover:opacity-100'
                        }`}
                      >
                        <span className="text-3xl">{pixie.emoji}</span>
                        <span className="text-xs font-black text-slate-700">{pixie.name.split(' ')[0]}</span>
                      </button>
                    ))}
                  </div>
                </div>

                {/* 介紹資訊 */}
                <div className="mt-3 bg-white/80 p-3 rounded-2xl text-xs text-slate-600 border border-slate-100 flex items-start gap-2">
                  <span className="text-base">💡</span>
                  <div className="leading-relaxed">
                    <span className="font-extrabold text-slate-800">精靈天賦：</span>
                    {selectedPixie.desc}
                  </div>
                </div>

                {/* 開始按鈕 */}
                <button
                  onClick={() => {
                    if (soundEnabled) playSound('success');
                    setGameState('dashboard');
                    setIsActive(true);
                    setTimeLeft(screenTimeSetting * 60);
                  }}
                  disabled={!kidName.trim()}
                  className={`w-full py-3.5 mt-5 rounded-2xl font-black text-white shadow-lg flex items-center justify-center gap-2 transition active:scale-95 ${
                    kidName.trim() 
                      ? 'bg-gradient-to-r from-indigo-500 to-blue-600 hover:opacity-95' 
                      : 'bg-slate-300 cursor-not-allowed'
                  }`}
                >
                  <Icon name="play" size={18} fill="currentColor" />
                  <span>開啟護眼冒險！</span>
                </button>
              </div>
            )}

            {/* ==================== 2. 主控制台 ==================== */}
            {gameState === 'dashboard' && (
              <div className="flex-1 flex flex-col justify-between py-1 animate-fade-in">
                
                {/* 測試沙盒 */}
                <div className="bg-amber-50/90 border border-amber-200 rounded-2xl p-2.5 flex flex-col gap-1.5 mb-2 shadow-sm text-xs text-amber-900">
                  <div className="flex justify-between items-center font-bold">
                    <span>🛠️ 測試沙盒（供您快速體驗功能）：</span>
                    <span className="bg-amber-200/80 px-1.5 py-0.5 rounded text-[10px] text-amber-950">開發者調試</span>
                  </div>
                  <div className="flex gap-2">
                    <button 
                      onClick={() => { setIsSpeedUp(!isSpeedUp); if (soundEnabled) playSound('click'); }}
                      className={`flex-1 py-1 px-2 rounded-lg font-black text-center border transition active:scale-95 text-[11px] ${
                        isSpeedUp ? 'bg-amber-600 text-white border-amber-700' : 'bg-white hover:bg-amber-100 border-amber-300'
                      }`}
                    >
                      🚀 {isSpeedUp ? '加速中 (100x)' : '標準速度 (可加速)'}
                    </button>
                    <button 
                      onClick={forceTimeOut}
                      className="flex-1 py-1 px-2 bg-rose-500 hover:bg-rose-600 active:scale-95 text-white font-black rounded-lg transition text-center text-[11px]"
                    >
                      ⏰ 模擬時間結束
                    </button>
                  </div>
                </div>

                {/* 精靈動畫區 */}
                <div className="flex-1 flex flex-col items-center justify-center relative min-h-[150px] my-1">
                  {/* 配件渲染 */}
                  <div className="absolute inset-0 pointer-events-none flex flex-col items-center justify-center">
                    {equippedItems.head === 'party_hat' && (
                      <span className="text-3xl absolute -translate-y-16 translate-x-4 animate-bounce z-10">🥳</span>
                    )}
                    {equippedItems.head === 'gold_crown' && (
                      <span className="text-2xl absolute -translate-y-[70px] z-10 rotate-12">👑</span>
                    )}
                    {equippedItems.hand === 'magic_wand' && (
                      <span className="text-2xl absolute translate-x-12 translate-y-8 z-10 animate-pulse">🪄</span>
                    )}
                  </div>

                  <div className="relative">
                    {selectedPixie.svgBody(
                      selectedPixieId === 'alu' ? '#34d399' : selectedPixieId === 'momo' ? '#fb7185' : '#38bdf8',
                      calculateFatigue() >= 70, 
                      false 
                    )}
                    {equippedItems.eyes === 'cool_glasses' && (
                      <span className="text-3xl absolute left-1/2 top-[48%] -translate-x-1/2 -translate-y-1/2 z-10 select-none scale-x-125">🕶️</span>
                    )}
                  </div>

                  <div className="mt-2.5 bg-white px-4 py-1.5 rounded-2xl shadow-sm border border-slate-100 text-xs font-black text-slate-500 max-w-[85%] text-center animate-pulse">
                    {calculateFatigue() < 30 && `哈囉 ${kidName}！小夥伴現在陪你一起上課看螢幕！`}
                    {calculateFatigue() >= 30 && calculateFatigue() < 70 && "看螢幕有一陣子了，眼睛累了就眨眨眼哦！"}
                    {calculateFatigue() >= 70 && "眼睛感覺有點痠累...時間一到我們就去充電探險！"}
                  </div>
                </div>

                {/* 控制台與計時元件 */}
                <div className="bg-white p-4 rounded-3xl shadow-md border border-slate-100 space-y-3.5">
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-1.5">
                      <Icon name="tv" className="text-indigo-500" size={15} />
                      <span className="text-xs font-extrabold text-slate-500">當前階段：連續用眼計時</span>
                    </div>
                    <span className="text-[10px] font-black text-indigo-600 bg-indigo-50 px-2.5 py-0.5 rounded-full">
                      用眼達 {screenTimeSetting} 分鐘 ⌛
                    </span>
                  </div>

                  <div className="flex items-center justify-between gap-3">
                    <div className="flex-1">
                      <div className="h-3 bg-slate-100 rounded-full overflow-hidden">
                        <div 
                          className="h-full bg-gradient-to-r from-indigo-400 to-indigo-600 transition-all duration-300"
                          style={{ width: `${(timeLeft / (screenTimeSetting * 60)) * 100}%` }}
                        ></div>
                      </div>
                      <div className="flex justify-between text-[9px] text-slate-400 font-black mt-1">
                        <span>剩餘時間 {Math.ceil(timeLeft / 60)} 分鐘</span>

                        <span className="font-black">💡 當前的時間派發邏輯：</span>
                        <p>。 螢幕設定 <span className="font-bold">≤ 15 分鐘</span>：指派【快速熱敷 / 眨眼】等超輕量放鬆。</p>
                        <p>。 螢幕設定 <span className="font-bold">16 ~ 29 分鐘</span>：指派【遠眺植物 / 家事學 / 全感聆聽】任務。</p>
                        <p>。 螢幕設定 <span className="font-bold">≥ 30 分鐘</span>：強制指派【全身大肌肉運動】，緩解久坐疲勞！</p>
                      </div>
                    </div>

                    {/* 第二板塊：自訂實體充電任務庫（可自訂對應時間門檻） */}
                    <div className="space-y-2">
                      <h4 className="text-xs font-black text-slate-700 flex items-center gap-1.5">
                        <Icon name="plus" size={13} className="text-indigo-500" />
                        <span>2. 自訂實體放鬆任務及「時間門檻」</span>
                      </h4>
                      
                      <form onSubmit={handleAddQuest} className="space-y-2">
                        <div className="grid grid-cols-2 gap-2">
                          <div className="flex flex-col gap-1">
                            <label className="text-[9px] text-slate-400 font-bold">任務屬性</label>
                            <select 
                              value={newQuestCategory}
                              onChange={(e) => setNewQuestCategory(e.target.value)}
                              className="px-2 py-1.5 bg-slate-50 border rounded-lg text-xs font-bold focus:outline-none"
                            >
                              <option value="body">🏃‍♂️ 全身大動動</option>
                              <option value="vision">👁️ 遠眺綠植物</option>
                              <option value="mind">🧘 輕眼睫放鬆</option>
                              <option value="chore">🧹 家事小幫手</option>
                            </select>
                          </div>
                          
                          <div className="flex flex-col gap-1">
                            <label className="text-[9px] text-slate-400 font-bold">最少需看螢幕幾分鐘才派發？</label>
                            <div className="flex items-center gap-1">
                              <input 
                                type="number"
                                min={0}
                                max={60}
                                value={newQuestMinTime}
                                onChange={(e) => setNewQuestMinTime(Math.max(0, parseInt(e.target.value) || 0))}
                                className="w-16 px-2 py-1 border rounded-lg text-xs font-bold focus:outline-none"
                              />
                              <span className="text-[10px] text-slate-500 font-bold">分鐘</span>
                            </div>
                          </div>
                        </div>

                        <div className="flex flex-col gap-1">
                          <label className="text-[9px] text-slate-400 font-bold">任務敘述文字</label>
                          <input 
                            type="text" 
                            value={newQuestText}
                            onChange={(e) => setNewQuestText(e.target.value)}
                            placeholder="如：走到陽台看大樹 15 秒..."
                            className="w-full px-3 py-1.5 border rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-indigo-400 font-bold"
                          />
                        </div>

                        <button 
                          type="submit" 
                          className="w-full py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold rounded-lg text-xs transition active:scale-95"
                        >
                          ＋ 儲存並加入隨機任務庫
                        </button>
                      </form>

                      {/* 家長任務庫清單與各別時間門檻審查 */}
                      <div className="bg-slate-50 rounded-xl p-2.5 max-h-[140px] overflow-y-auto space-y-1.5 border border-slate-150 no-scrollbar">
                        {customQuests.map((q) => (
                          <div key={q.id} className="flex justify-between items-start bg-white p-2 rounded-lg border border-slate-100 text-[10px] gap-2">
                            <div className="flex-1">
                              <span className="font-extrabold text-[8px] px-1.5 py-0.5 rounded bg-indigo-50 text-indigo-600 mr-1.5">
                                {q.categoryName}
                              </span>
                              <span className="font-black text-[8px] px-1.5 py-0.5 rounded bg-amber-50 text-amber-700 mr-1">
                                用眼 ≥ {q.minScreenTime} 分鐘派發
                              </span>
                              <p className="text-slate-600 mt-1 leading-relaxed font-semibold">{q.text}</p>
                            </div>
                            <button 
                              type="button"
                              onClick={() => handleDeleteQuest(q.id)}
                              className="text-red-500 hover:text-red-700 p-0.5"
                            >
                              <Icon name="trash-2" size={11} />
                            </button>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* 第三板塊：孩子眼球日記審查 */}
                    <div className="space-y-2">
                      <h4 className="text-xs font-black text-slate-700 flex items-center gap-1.5">
                        <Icon name="book-open" size={13} className="text-indigo-600" />
                        <span>✨ 今日孩子寫下的「眼球探險日記」({historyLogs.length})</span>
                      </h4>
                      
                      <div className="bg-slate-50 rounded-xl p-2.5 max-h-[140px] overflow-y-auto space-y-2 border border-slate-150 no-scrollbar">
                        {historyLogs.map(log => (
                          <div key={log.id} className="bg-white p-2.5 rounded-lg border border-slate-100 text-xs shadow-2xs">
                            <div className="flex justify-between items-center border-b border-slate-50 pb-1.5 mb-1.5 text-[9px]">
                              <div className="flex items-center gap-1.5">
                                <span className="text-xs">
                                  {log.comfort === 'good' ? '😌' : log.comfort === 'medium' ? '😐' : '😣'}
                                </span>
                                <span className="text-slate-400 font-black">{log.time}</span>
                              </div>
                              <span className="text-yellow-600 font-black">💎 + {log.reward} 水晶</span>
                            </div>
                            <div className="space-y-1 text-[10px]">
                              <p className="font-black text-indigo-900">{log.action}</p>
                              <p className="text-slate-600 bg-indigo-50/20 p-1.5 rounded-md italic font-bold">
                                📝 「 {log.note} 」
                              </p>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                  </div>
                )}

                <button
                  onClick={() => { if (soundEnabled) playSound('click'); setParentModalOpen(false); }}
                  className="w-full py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-extrabold rounded-xl transition text-xs mt-2"
                >
                  關閉控制中心
                </button>
              </div>
            </div>
          )}

        </div>
      );
    }

    // 啟動 React 應用程式掛載
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
